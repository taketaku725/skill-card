<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>スキルカード詳細</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <!-- ゲーム切替 -->
  <div class="game-switch">
    <button class="game-btn active" data-game="casino">カジノ</button>
    <button class="game-btn" data-game="sugoroku">すごろく</button>
  </div>

  <!-- 入力エリア -->
  <div class="input-area">
    <div id="display">--</div>
    <div class="keypad">
      <button class="num">1</button>
      <button class="num">2</button>
      <button class="num">3</button>
      <button class="num">4</button>
      <button class="num">5</button>
      <button class="num">6</button>
      <button class="num">7</button>
      <button class="num">8</button>
      <button class="num">9</button>
      <button id="clear">C</button>
      <button class="num">0</button>
      <button id="add">追加</button>
    </div>
  </div>

  <!-- 手持ちエリア -->
  <div id="hand" class="hand-area"></div>

</div>

<!-- ポップアップ -->
<div id="popup" class="popup hidden">
  <div class="popup-content">
    <button id="closePopup" class="close-btn">×</button>
    <h2 id="popupTitle"></h2>
    <p id="popupEffect"></p>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
